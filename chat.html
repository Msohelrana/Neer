    // ----- Toast (small floating message) -----
    let toastEl = null;
    let toastTimer = null;
    function showToast(text, duration = 1800) {
      if (!toastEl) {
        toastEl = document.createElement("div");
        toastEl.className = "toast";
        toastEl.setAttribute("role", "status");
        document.body.appendChild(toastEl);
      }
      toastEl.textContent = text;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), duration);
    }

    // ----- Voice call (WebRTC + Appwrite signaling) -----
    // Two separate ring tones: caller hears one while waiting, receiver hears
    // a louder one while the Accept/Decline dialog is up.
    const OUTGOING_RING_SRC = "./audio/call ring.mp3";
    const INCOMING_RING_SRC = "./audio/receiver ring.mp3";
    let _outAudio = null;
    let _inAudio  = null;
    function _outRing() {
      if (!_outAudio) {
        _outAudio = new Audio(OUTGOING_RING_SRC);
        _outAudio.loop = true;
        _outAudio.preload = "auto";
      }
      return _outAudio;
    }
    function _inRing() {
      if (!_inAudio) {
        _inAudio = new Audio(INCOMING_RING_SRC);
        _inAudio.loop = true;
        _inAudio.preload = "auto";
      }
      return _inAudio;
    }
    // The caller's ringback belongs in the earpiece, like a real phone call.
    // (The receiver's ring intentionally stays on the media speaker.)
    async function routeRingToEarpiece(a) {
      try {
        if (!a.setSinkId) return;
        const devs = await navigator.mediaDevices.enumerateDevices();
        const ear = devs.find((d) => d.kind === "audiooutput" && /earpiece|receiver/.test(d.label.toLowerCase()));
        if (ear) await a.setSinkId(ear.deviceId);
        else await a.setSinkId("communications");
      } catch {}
    }
    function playOutgoingRing() {
      stopRing();
      const a = _outRing();
      a.volume = 0.5;
      a.currentTime = 0;
      routeRingToEarpiece(a).then(() => {
        a.play().catch((e) => console.warn("Outgoing ring play failed:", e?.message));
      });
    }
    function playIncomingRing() {
      stopRing();
      const a = _inRing();
      a.volume = 1.0;
      a.currentTime = 0;
      a.play().catch((e) => console.warn("Incoming ring play failed:", e?.message));
      if (navigator.vibrate) navigator.vibrate([2000, 1000, 2000, 1000, 2000]);
    }
    function stopRing() {
      [_outAudio, _inAudio].forEach((a) => {
        if (!a) return;
        try { a.pause(); a.currentTime = 0; } catch {}
      });
      if (navigator.vibrate) navigator.vibrate(0);
    }

    const callOverlay  = document.getElementById("call-overlay");
    const callAvatarEl = document.getElementById("call-avatar");
    const callNameEl   = document.getElementById("call-name");
    const callStatusEl = document.getElementById("call-status");
    const callCtrlsEl  = document.getElementById("call-controls");
    const callPill     = document.getElementById("call-pill");
    const callPillText = document.getElementById("call-pill-text");
    const callMinBtn   = document.getElementById("call-minimize");
    let activeCall = null;
    let callTimer  = null;
    let muted = false;
    let pendingIncoming = null; // { callId, other, cancel } while the receiver hasn't answered yet

    // Header pill: visible only when a call involving the open chat's peer is
    // running while the overlay is minimized. Click → back to the call screen.
    function updateCallPill() {
      const peer = activeCall?.other || pendingIncoming?.other;
      const show = !!peer && callOverlay.classList.contains("hidden") &&
                   activeOther && peer.$id === activeOther.$id;
      callPill.classList.toggle("hidden", !show);
      if (show) callPillText.textContent = callStatusEl.textContent;
    }
    callMinBtn.addEventListener("click", () => {
      callOverlay.classList.add("hidden");
      updateCallPill();
    });
    callPill.addEventListener("click", () => {
      callOverlay.classList.remove("hidden");
      updateCallPill();
    });

    const CALL_ICON_END   = `<svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .4-.23.74-.56.9-.98.48-1.87 1.1-2.66 1.85a.998.998 0 0 1-1.41 0L.29 13.08a.95.95 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48a.998.998 0 0 1-1.41 0c-.79-.74-1.69-1.36-2.67-1.85a1.01 1.01 0 0 1-.56-.9v-3.1A16.84 16.84 0 0 0 12 9z" fill="currentColor" transform="rotate(135 12 12)"/></svg>`;

    function callBtn(label, html, cls, onClick) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "call-btn-circle " + cls;
      b.setAttribute("aria-label", label);
      b.innerHTML = html;
      b.addEventListener("click", onClick);
      return b;
    }

    function showCallUI(other, status, controls) {
      paintAvatar(callAvatarEl, other.$id, other.name || other.email);
      callAvatarEl.classList.remove("ringing");
      callNameEl.textContent = other.name;
      callStatusEl.textContent = status;
      callCtrlsEl.innerHTML = "";
      controls.forEach((c) => callCtrlsEl.appendChild(c));
      callOverlay.classList.remove("hidden");
      updateCallPill();
    }

    function hideCallUI() {
      callOverlay.classList.add("hidden");
      callAvatarEl.classList.remove("ringing");
      if (callTimer) { clearInterval(callTimer); callTimer = null; }
      updateCallPill();
    }

    function startCallTimer() {
      const start = Date.now();
      if (callTimer) clearInterval(callTimer);
      callTimer = setInterval(() => {
        const s = Math.floor((Date.now() - start) / 1000);
        const mm = String(Math.floor(s / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        callStatusEl.textContent = `${mm}:${ss}`;
        callPillText.textContent = `${mm}:${ss}`;
      }, 1000);
    }

    function endActiveCall() {
      if (!activeCall) return;
      activeCall.hangup();
      activeCall = null;
      muted = false;
      hideCallUI();
    }

    function wireCall(call, other, conv) {
      call.on("ringing", () => {
        showCallUI(other, "Calling…", [
          callBtn("End call", CALL_ICON_END, "end danger", endActiveCall),
        ]);
        playOutgoingRing();
      });
      // The moment either side picks up — stop ringing, flip to call screen,
      // start the timer. Both peers reach this within ~200 ms of each other.
      call.on("accepted", () => {
        stopRing();
        muted = false;
        let loud = false;
        startCallTimer();
        callStatusEl.textContent = "00:00";
        callCtrlsEl.innerHTML = "";
        const muteBtn = callBtn("Toggle mute", CALL_ICON_MIC, "mute", () => {
          muted = !muted;
          call.setMuted(muted);
          muteBtn.innerHTML = muted ? CALL_ICON_MUTE : CALL_ICON_MIC;
          muteBtn.classList.toggle("active", muted);
        });
        const spkBtn = callBtn("Loudspeaker", CALL_ICON_SPEAKER, "speaker", () => {
          loud = !loud;
          call.setLoudspeaker(loud);
          spkBtn.classList.toggle("active", loud);
        });
        callCtrlsEl.append(
          muteBtn,
          spkBtn,
          callBtn("End call", CALL_ICON_END, "end danger", endActiveCall),
        );
      });
      call.on("ended", () => {
        stopRing();
        if (activeCall === call) {
          activeCall = null;
          hideCallUI();
          showToast(`Call with ${other.name} ended`);
        }
        // Caller logs a single call-history record; both sides see it via realtime.
        if (call.kind === "out" && conv) {
          const duration = call.startedAt ? Math.floor((Date.now() - call.startedAt) / 1000) : 0;
          const status = duration > 0 ? "accepted" : "missed";
          sendMessage(conv, me.$id, "__CALL__" + JSON.stringify({ status, duration })).catch(() => {});
        }
      });
    }

    async function startOutgoingCall(other) {
      if (activeCall) { showToast("Already on a call"); return; }
      const conv = activeConversation;
      if (!conv) return;
      const callId = AppwriteID.unique();
      const call = new Call(me, other, callId, "out");
      activeCall = call;
      wireCall(call, other, conv);
      // Auto-cancel if the other side never picks up within the timeout.
      const ringTimer = setTimeout(() => {
        if (activeCall === call && !call.startedAt) {
          showToast(`${other.name} didn't answer`);
          endActiveCall();
        }
      }, RING_TIMEOUT_MS);
      call.on("accepted", () => clearTimeout(ringTimer));
      call.on("ended",    () => clearTimeout(ringTimer));
      try {
        await call.startOutgoing();
      } catch (err) {
        clearTimeout(ringTimer);
        endActiveCall();
        dialogAlert("Couldn't start call: " + (err?.message || err));
      }
    }

    function handleIncomingCall(sig, other) {
      if (activeCall) {
        // Already busy — auto-decline by sending end.
        const tmp = new Call(me, other, sig.callId, "in");
        tmp.hangup();
        return;
      }
      const callId = sig.callId;
      const offer = sig._payload;
      playIncomingRing();

      // Auto-decline if the user doesn't pick up within the timeout.
      const ringTimer = setTimeout(() => {
        cancelPendingIncoming();
        const tmp = new Call(me, other, callId, "in");
        tmp.hangup();
        showToast(`Missed call from ${other.name}`);
      }, RING_TIMEOUT_MS);

      function cancelPendingIncoming() {
        clearTimeout(ringTimer);
        stopRing();
        hideCallUI();
        pendingIncoming = null;
      }
      pendingIncoming = { callId, other, cancel: cancelPendingIncoming };

      // Reuse the full-screen call overlay for the incoming ring screen, with
      // real Accept (green phone) + Decline (red rotated phone) icon buttons.
      const decline = callBtn("Decline", CALL_ICON_END, "end danger", () => {
        cancelPendingIncoming();
        const tmp = new Call(me, other, callId, "in");
        tmp.hangup();
      });
      const accept = callBtn("Accept", CALL_ICON_ACCEPT, "accept success", async () => {
        cancelPendingIncoming();
        const call = new Call(me, other, callId, "in");
        activeCall = call;
        wireCall(call, other);
        // Keep the call screen up for the receiver — cancelPendingIncoming()
        // hid the overlay and "accepted" only repaints its contents.
        showCallUI(other, "Connecting…", []);
        try {
          await call.acceptIncoming(offer);
        } catch (err) {
          endActiveCall();
          dialogAlert("Couldn't accept call: " + (err?.message || err));
        }
      });
      showCallUI(other, "Incoming voice call…", [decline, accept]);
      callAvatarEl.classList.add("ringing");
    }

    // Listen for signaling docs addressed to me.
    subscribeSignals(me.$id, async (sig) => {
      if (sig.type === "offer") {
        const users = getCachedUserList(me.$id)?.users || [];
        const other = users.find((u) => u.$id === sig.from);
        if (other) handleIncomingCall(sig, other);
      } else if (sig.type === "end" && pendingIncoming && pendingIncoming.callId === sig.callId) {
        // Caller hung up before we picked up — kill the ringtone + dialog.
        pendingIncoming.cancel();
        showToast("Caller cancelled");
      } else if (activeCall && activeCall.callId === sig.callId) {
        await activeCall.handleSignal(sig);
      }
    });

    // ----- Composer compact/expanded state -----
    // Default: all 4 left-side buttons visible. Focusing the input collapses
    // them into a single `>` arrow, Messenger-style. 20s of no typing while
    // focused, or tapping the `>`, brings them back.
    const expandedActions = document.querySelectorAll(".composer-expanded-action");
    const moreBtnEl = document.getElementById("more-btn");
    let composerCompact = false;
    let composerExpandTimer = null;

    function setComposerCompact(compact) {
      composerCompact = compact;
      expandedActions.forEach((b) => b.classList.toggle("hidden", compact));
      moreBtnEl.classList.toggle("hidden", !compact);
    }
    function cancelComposerTimer() {
      if (composerExpandTimer) {
        clearTimeout(composerExpandTimer);
        composerExpandTimer = null;
      }
    }
    inputEl.addEventListener("focus", () => {
      if (composerCompact) return;
      setComposerCompact(true);
      cancelComposerTimer();
      if (COMPOSER_AUTO_EXPAND_MS > 0) {
        composerExpandTimer = setTimeout(() => {
          setComposerCompact(false);
          composerExpandTimer = null;
        }, COMPOSER_AUTO_EXPAND_MS);
      }
    });
    inputEl.addEventListener("input", cancelComposerTimer);
    moreBtnEl.addEventListener("click", () => {
      cancelComposerTimer();
      setComposerCompact(false);
    });
    ["plus-btn", "mic-btn"].forEach((id) => {
      document.getElementById(id).addEventListener("click", () => {
        showToast("Coming soon");
      });
    });

    // ----- Photo sending -----
    const galleryInput = document.createElement("input");
    galleryInput.type = "file";
    galleryInput.accept = "image/*,video/*";
    galleryInput.multiple = true;
    galleryInput.style.display = "none";
    document.body.appendChild(galleryInput);

    const cameraInput = document.createElement("input");
    cameraInput.type = "file";
    cameraInput.accept = "image/*";
    cameraInput.capture = "environment";
    cameraInput.style.display = "none";
    document.body.appendChild(cameraInput);

    document.getElementById("gallery-btn").addEventListener("click", () => {
      if (!activeConversation) return;
      if (isOffline()) { showToast("Connect to send photos"); return; }
      galleryInput.value = "";
      galleryInput.click();
    });
    document.getElementById("camera-btn").addEventListener("click", () => {
      if (!activeConversation) return;
      if (isOffline()) { showToast("Connect to send photos"); return; }
      openCamera();
    });

    // ----- In-app camera (Messenger-style) -----
    const camOverlay   = document.getElementById("camera-overlay");
    const camVideo     = document.getElementById("camera-video");
    const camPreview   = document.getElementById("camera-preview");
    const camShutter   = document.getElementById("camera-shutter");
    const camFlipBtn   = document.getElementById("camera-flip");
    const camRetakeBtn = document.getElementById("camera-retake");
    const camSendBtn   = document.getElementById("camera-send");
    let camStream = null;
    let camFacing = "environment";
    let camBlob   = null;

    async function startCameraStream() {
      camStream?.getTracks().forEach((t) => t.stop());
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: camFacing },
        audio: false,
      });
      camVideo.srcObject = camStream;
      // Mirror the live preview for the front camera, like every camera app.
      camVideo.classList.toggle("mirrored", camFacing === "user");
    }

    async function openCamera() {
      try {
        await startCameraStream();
      } catch {
        // No camera / permission denied — fall back to the native capture input.
        cameraInput.value = "";
        cameraInput.click();
        return;
      }
      resetCameraUI();
      camOverlay.classList.remove("hidden");
      // Own a history entry so the phone back button closes the camera
      // instead of quitting the app.
      if (!history.state || history.state.view !== "camera") {
        history.pushState({ view: "camera" }, "");
      }
    }

    // Close via the history entry when we own one, so phone-back and the X
    // button flow through the same popstate path.
    function requestCloseCamera() {
      if (history.state?.view === "camera") history.back();
      else closeCamera();
    }

    function resetCameraUI() {
      if (camPreview.src) { URL.revokeObjectURL(camPreview.src); camPreview.removeAttribute("src"); }
      camBlob = null;
      camPreview.classList.add("hidden");
      camVideo.classList.remove("hidden");
      camShutter.classList.remove("hidden");
      camFlipBtn.classList.remove("hidden");
      camRetakeBtn.classList.add("hidden");
      camSendBtn.classList.add("hidden");
    }

    function closeCamera() {
      camStream?.getTracks().forEach((t) => t.stop());
      camStream = null;
      camVideo.srcObject = null;
      resetCameraUI();
      camOverlay.classList.add("hidden");
    }

    camShutter.addEventListener("click", () => {
      if (!camVideo.videoWidth) return;
      const canvas = document.createElement("canvas");
      canvas.width = camVideo.videoWidth;
      canvas.height = camVideo.videoHeight;
      const ctx = canvas.getContext("2d");
      if (camFacing === "user") {
        // Capture what the mirrored preview showed.
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(camVideo, 0, 0);
      canvas.toBlob((blob) => {
        if (!blob) { showToast("Couldn't take the photo"); return; }
        camBlob = blob;
        camPreview.src = URL.createObjectURL(blob);
        camPreview.classList.remove("hidden");
        camVideo.classList.add("hidden");
        camShutter.classList.add("hidden");
        camFlipBtn.classList.add("hidden");
        camRetakeBtn.classList.remove("hidden");
        camSendBtn.classList.remove("hidden");
      }, "image/jpeg", 0.92);
    });

    camRetakeBtn.addEventListener("click", resetCameraUI); // stream kept alive
    camSendBtn.addEventListener("click", () => {
      if (!camBlob) return;
      const file = new File([camBlob], "camera.jpg", { type: "image/jpeg" });
      requestCloseCamera();
      sendPhotos([file]);
    });
    camFlipBtn.addEventListener("click", async () => {
      camFacing = camFacing === "user" ? "environment" : "user";
      try {
        await startCameraStream();
      } catch {
        camFacing = camFacing === "user" ? "environment" : "user";
        showToast("Couldn't switch camera");
      }
    });
    document.getElementById("camera-close").addEventListener("click", requestCloseCamera);
    galleryInput.addEventListener("change", (e) => sendPhotos(e.target.files));
    cameraInput.addEventListener("change", (e) => sendPhotos(e.target.files));

    // ----- Image lightbox -----
    const lightboxEl    = document.getElementById("lightbox");
    const lightboxImgEl = document.getElementById("lightbox-img");
    let lightboxImageId = null;

    const lightboxPrevBtn   = document.getElementById("lightbox-prev");
    const lightboxNextBtn   = document.getElementById("lightbox-next");
    const lightboxCounterEl = document.getElementById("lightbox-counter");
    let lightboxGallery = []; // chronological imageIds of the open chat

    function chatImageIds() {
      return [...messageMap.values()]
        .filter((m) => m.imageId && !isDeleted(m))
        .sort((a, b) => (a.$createdAt < b.$createdAt ? -1 : 1))
        .map((m) => m.imageId);
    }

    function paintLightboxNav() {
      const i = lightboxGallery.indexOf(lightboxImageId);
      const many = lightboxGallery.length > 1;
      lightboxPrevBtn.classList.toggle("hidden", !many || i <= 0);
      lightboxNextBtn.classList.toggle("hidden", !many || i >= lightboxGallery.length - 1);
      lightboxCounterEl.classList.toggle("hidden", !many);
      if (many) lightboxCounterEl.textContent = `${i + 1} / ${lightboxGallery.length}`;
    }

    const lightboxVideoEl = document.getElementById("lightbox-video");

    function showLightboxImage(imageId) {
      lightboxImageId = imageId;
      lightboxImgEl.src = "";
      lightboxVideoEl.pause();
      lightboxVideoEl.removeAttribute("src");
      lightboxImgEl.classList.remove("hidden");
      lightboxVideoEl.classList.add("hidden");
      // The shared cache already holds the full-quality file.
      bubbleMediaUrl(imageId).then(({ url, type }) => {
        if (lightboxImageId !== imageId) return;
        if (type && type.startsWith("video/")) {
          lightboxImgEl.classList.add("hidden");
          lightboxVideoEl.classList.remove("hidden");
          lightboxVideoEl.src = url;
        } else {
          lightboxImgEl.src = url;
        }
      }).catch(() => {});
      paintLightboxNav();
    }

    function lightboxStep(dir) {
      const i = lightboxGallery.indexOf(lightboxImageId);
      const next = lightboxGallery[i + dir];
      if (next) showLightboxImage(next);
    }

    function openLightbox(imageId) {
      lightboxGallery = chatImageIds();
      showLightboxImage(imageId);
      lightboxEl.classList.remove("hidden");
      if (!history.state || history.state.view !== "lightbox") {
        history.pushState({ view: "lightbox" }, "");
      }
    }
    function hideLightboxUI() {
      lightboxEl.classList.add("hidden");
      // Media URLs come from the shared cache — stop playback, don't revoke.
      lightboxImgEl.src = "";
      lightboxVideoEl.pause();
      lightboxVideoEl.removeAttribute("src");
      lightboxImageId = null;
    }
    // Pop the "lightbox" history entry — popstate handler hides the UI. This
    // way phone-back and the X button both flow through one path, and we don't
    // end up double-popping into leaveActiveConversation.
    function closeLightbox() {
      if (lightboxEl.classList.contains("hidden")) return;
      if (history.state?.view === "lightbox") history.back();
      else hideLightboxUI();
    }
    lightboxEl.addEventListener("click", (e) => {
      if (e.target.closest(".lightbox-btn")) return;
      closeLightbox();
    });
    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    document.getElementById("lightbox-save").addEventListener("click", () => {
      if (lightboxImageId) saveImage(lightboxImageId);
    });
    lightboxPrevBtn.addEventListener("click", () => lightboxStep(-1));
    lightboxNextBtn.addEventListener("click", () => lightboxStep(1));
    document.addEventListener("keydown", (e) => {
      if (lightboxEl.classList.contains("hidden")) return;
      if (e.key === "ArrowRight") lightboxStep(1);
      else if (e.key === "ArrowLeft") lightboxStep(-1);
    });
    // Horizontal swipe steps through the chat's photos, Messenger-style.
    let lbSwipeX = null, lbSwipeY = null;
    lightboxEl.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        lbSwipeX = e.touches[0].clientX;
        lbSwipeY = e.touches[0].clientY;
      } else {
        lbSwipeX = lbSwipeY = null;
      }
    }, { passive: true });
    lightboxEl.addEventListener("touchend", (e) => {
      if (lbSwipeX === null) return;
      const dx = e.changedTouches[0].clientX - lbSwipeX;
      const dy = e.changedTouches[0].clientY - lbSwipeY;
      lbSwipeX = lbSwipeY = null;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        lightboxStep(dx < 0 ? 1 : -1);
      }
    });

    async function saveImage(imageId) {
      try {
        const res = await fetch(imageViewUrl(imageId), { credentials: "include" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const blob = await res.blob();
        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objectUrl;
        const ext = (blob.type.split("/")[1] || "jpg").split(";")[0];
        a.download = `neer-${blob.type.startsWith("video/") ? "video" : "photo"}-${Date.now()}.${ext}`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(objectUrl);
        showToast("Photo saved");
      } catch (err) {
        dialogAlert("Save failed: " + (err?.message || err));
      }
    }

    const MAX_VIDEO_BYTES = 50 * 1024 * 1024; // Appwrite bucket limit

    async function sendPhotos(fileList) {
      const all = Array.from(fileList || []).filter(
        (f) => f && (f.type.startsWith("image/") || f.type.startsWith("video/"))
      );
      const files = all.filter((f) => {
        if (f.type.startsWith("video/") && f.size > MAX_VIDEO_BYTES) {
          dialogAlert(`"${f.name}" is too large — videos can be up to 50 MB.`);
          return false;
        }
        return true;
      });
      if (!files.length || !activeConversation || !activeOther) return;
      const caption = inputEl.value.trim();
      inputEl.value = "";
      setReply(null);
      refreshComposerMode();

      const conv = activeConversation;
      const convId = conv.$id;
      // Paint every bubble up-front so the whole batch shows instantly;
      // the caption rides on the first photo only.
      const jobs = files.map((file, i) => {
        const tempId = tempMsgId();
        const localUrl = URL.createObjectURL(file);
        const text = i === 0 ? caption : "";
        renderMessage({
          $id: tempId,
          conversationId: convId,
          senderId: me.$id,
          receiverId: activeOther.$id,
          text,
          $createdAt: new Date().toISOString(),
          $updatedAt: null,
          _pending: true,
          _localImageUrl: localUrl,
          _localMime: file.type,
        });
        return { file, tempId, localUrl, text };
      });

      // Upload one at a time so the messages land in the order they were picked.
      for (const job of jobs) {
        try {
          const fileDoc = await uploadMessageMedia(job.file, me.$id);
          const sent = await sendMessage(conv, me.$id, job.text, null, fileDoc.$id);
          applyMessageDelete(job.tempId);
          appendCachedMessage(me.$id, convId, sent);
          renderMessage(sent);
        } catch (err) {
          applyMessageDelete(job.tempId);
          dialogAlert("Photo send failed: " + (err?.message || err));
        } finally {
          URL.revokeObjectURL(job.localUrl);
        }
      }
    }
    document.getElementById("call-btn").addEventListener("click", () => {
      if (activeOther) startOutgoingCall(activeOther);
    });
    document.getElementById("video-btn").addEventListener("click", () => {
      showToast(activeOther ? `Video call to ${activeOther.name || activeOther.email} is not available yet` : "");
    });
    document.getElementById("info-btn").addEventListener("click", () => {
      if (!activeOther) return;
      showToast(`${activeOther.name} · ${activeOther.email}`, 2600);
    });

    // ----- Settings modal -----
    const settingsModal = document.getElementById("settings-modal");
    const settingsMsg   = document.getElementById("settings-msg");
    const themeToggle   = document.getElementById("theme-toggle");
    const nameForm      = document.getElementById("name-form");
    const passwordForm  = document.getElementById("password-form");
    const meNameEl      = document.getElementById("me-name");

    function showSettingsMsg(text, isError = false) {
      settingsMsg.textContent = text;
      settingsMsg.classList.toggle("error", isError);
    }

    function syncThemeButtons() {
      const current = getTheme();
      themeToggle.querySelectorAll("button").forEach(b => {
        b.classList.toggle("active", b.dataset.theme === current);
      });
    }

    const notifyBtn = document.getElementById("notify-btn");
    function refreshNotifyBtn() {
      if (!notifyAvailable()) {
        notifyBtn.textContent = "Notifications not supported";
        notifyBtn.disabled = true;
        return;
      }
      switch (Notification.permission) {
        case "granted":
          notifyBtn.textContent = "Notifications enabled ✓";
          notifyBtn.disabled = true;
          break;
        case "denied":
          notifyBtn.textContent = "Blocked — change in browser settings";
          notifyBtn.disabled = true;
          break;
        default:
          notifyBtn.textContent = "Enable notifications";
          notifyBtn.disabled = false;
      }
    }
    notifyBtn.addEventListener("click", async () => {
      if (!notifyAvailable()) return;
      try {
        const result = await Notification.requestPermission();
        if (result === "granted") {
          // Subscribe this device to Web Push so notifications also arrive
          // when the tab is closed (handled by the send-push function).
          enablePush(me.$id).catch((e) => console.warn("Push subscribe:", e));
          try {
            new Notification("Neer notifications enabled", {
              body: "You'll get alerts for new messages.",
              icon: "./icon.svg",
              tag: "neer-test",
            });
          } catch {}
        }
      } catch {}
      refreshNotifyBtn();
    });

    // If permission was previously granted, re-subscribe on each load so the
    // user's push endpoint stays current (browsers rotate endpoints periodically).
    if ("Notification" in window && Notification.permission === "granted") {
      enablePush(me.$id).catch((e) => console.warn("Push re-subscribe:", e));
    }

    // Service-worker → page bridge: when a push notification is clicked, the
    // SW posts a message asking us to open the right conversation.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.addEventListener("message", (event) => {
        if (event.data?.type !== "open-conversation") return;
        const otherUserId = event.data.otherUserId;
        const users = getCachedUserList(me.$id)?.users || [];
        const user = users.find((u) => u.$id === otherUserId);
        if (user) openConversation(user);
      });
    }

    function openSettings() {
      nameForm.elements.name.value = me.name || "";
      passwordForm.reset();
      showSettingsMsg("");
      syncThemeButtons();
      refreshNotifyBtn();
      settingsModal.classList.remove("hidden");
      // Push a history entry so the phone/browser back button closes the
      // settings modal instead of exiting the app.
      if (!history.state || history.state.view !== "settings") {
        history.pushState({ view: "settings" }, "");
      }
    }

    function closeSettings() {
      // If we own a "settings" history entry, pop it — popstate will hide the
      // modal. Otherwise hide directly (defensive fallback).
      if (history.state && history.state.view === "settings") {
        history.back();
      } else {
        settingsModal.classList.add("hidden");
      }
    }

    document.getElementById("settings-btn").addEventListener("click", () => {
      if (isOffline()) {
        dialogAlert("Please check your internet connection and try again.");
        return;
      }
      openSettings();
    });
    document.getElementById("close-settings").addEventListener("click", closeSettings);
    settingsModal.addEventListener("click", (e) => {
      if (e.target === settingsModal) closeSettings();
    });

    themeToggle.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-theme]");
      if (!btn) return;
      setTheme(btn.dataset.theme);
      syncThemeButtons();
    });

    nameForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const newName = nameForm.elements.name.value.trim();
      if (!newName || newName === me.name) return;
      try {
        await updateName(newName);
        await updateProfileName(me.$id, newName);
        me.name = newName;
        meNameEl.textContent = newName;
        showSettingsMsg("Name updated.");
      } catch (err) {
        showSettingsMsg(err.message, true);
      }
    });

    passwordForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const current = passwordForm.elements.current.value;
      const next    = passwordForm.elements.next.value;
      try {
        await updatePassword(current, next);
        passwordForm.reset();
        showSettingsMsg("Password updated.");
      } catch (err) {
        showSettingsMsg(err.message, true);
      }
    });

    await renderUserList();
  </script>
</body>
</html>
