<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neer Chat</title>
  <meta name="theme-color" content="#0e1116" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <script type="module">
    import { applyTheme } from "./js/theme.js";
    import "./js/pwa.js";
    applyTheme();
  </script>
</head>
<body>
  <div class="chat" id="chat" data-view="sidebar">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="me">
          <div id="me-avatar" class="avatar avatar-sm" aria-hidden="true"></div>
          <strong id="me-name">…</strong>
        </div>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
      </div>
      <div class="brand">Neer</div>
      <div class="offline-banner hidden" data-offline-banner>No Internet Connection</div>
      <div class="user-list" id="user-list">
        <div class="empty">Loading users…</div>
      </div>
    </aside>

    <section class="thread">
      <div class="thread-header">
        <button id="back-btn" class="back-btn" type="button" aria-label="Back to chat list">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="thread-avatar" class="avatar hidden" aria-hidden="true"></div>
        <div id="thread-title" class="thread-title">
          <span class="placeholder">Select a user to start chatting</span>
        </div>
        <button type="button" class="call-pill hidden" id="call-pill" aria-label="Return to call">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.5.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.4 21 3 13.6 3 4c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.4 0 .8-.2 1l-2.2 2.3z" fill="currentColor"/></svg>
          <span id="call-pill-text">On call</span>
        </button>
        <div class="thread-actions hidden" id="thread-actions">
          <button type="button" class="header-icon-btn" id="call-btn" aria-label="Voice call" title="Voice call">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.5.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.4 21 3 13.6 3 4c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.4 0 .8-.2 1l-2.2 2.3z" fill="currentColor"/></svg>
          </button>
          <button type="button" class="header-icon-btn" id="video-btn" aria-label="Video call" title="Video call">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M17 10.5V7c0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h12c.6 0 1-.4 1-1v-3.5l4 4v-11l-4 4z" fill="currentColor"/></svg>
          </button>
          <button type="button" class="header-icon-btn" id="info-btn" aria-label="Conversation info" title="Conversation info">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
      <div class="offline-banner hidden" data-offline-banner>No Internet Connection</div>
      <div class="messages" id="messages">
        <div class="placeholder">No conversation selected.</div>
      </div>
      <form class="composer hidden" id="composer">
        <div class="reply-preview hidden" id="reply-preview">
          <div class="reply-preview-body">
            <span class="reply-preview-label">↩ Replying</span>
            <span class="reply-preview-text" id="reply-preview-text"></span>
          </div>
          <button type="button" class="reply-preview-close" id="reply-preview-close" aria-label="Cancel reply">×</button>
        </div>
        <div class="emoji-picker hidden" id="emoji-picker" role="dialog" aria-label="Emoji picker"></div>
        <div class="composer-row">
          <button type="button" id="plus-btn" class="composer-circle-btn composer-expanded-action" aria-label="More" title="More">
            <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" fill="currentColor"/></svg>
          </button>
          <button type="button" id="camera-btn" class="composer-circle-btn composer-expanded-action" aria-label="Camera" title="Camera">
            <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M9 2 7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" fill="currentColor"/></svg>
          </button>
          <button type="button" id="gallery-btn" class="composer-circle-btn composer-expanded-action" aria-label="Gallery" title="Gallery">
            <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" fill="currentColor"/></svg>
          </button>
          <button type="button" id="mic-btn" class="composer-circle-btn composer-expanded-action" aria-label="Voice message" title="Voice message">
            <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z" fill="currentColor"/></svg>
          </button>
          <button type="button" id="more-btn" class="composer-circle-btn more-btn hidden" aria-label="Show more options" title="Show more options">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="composer-pill">
            <textarea id="composer-input" placeholder="Type a message…" rows="1" autocomplete="off"></textarea>
            <button type="button" id="emoji-btn" class="composer-inline-btn emoji-btn" aria-label="Open emoji picker" title="Emoji">
              <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm-3.5-9c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm7 0c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zM12 17.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="currentColor"/></svg>
            </button>
          </div>
          <button type="submit" id="send-btn" class="composer-circle-btn send-btn hidden" aria-label="Send message" title="Send">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M2.3 3.4l19.4 8.6L2.3 20.6 5 13.3l9-1.3-9-1.3z" fill="currentColor"/></svg>
          </button>
          <button type="button" id="like-btn" class="composer-circle-btn like-btn" aria-label="Send like" title="Send like">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M2 21h3V10H2v11zM22 11c0-1.1-.9-2-2-2h-6.3l1-4.6V4c0-.4-.2-.8-.4-1.1L13.2 2 7 8.6c-.4.4-.6.9-.6 1.4v9c0 1.1.9 2 2 2h9c.8 0 1.5-.5 1.8-1.2l3-7.1c.1-.2.1-.5.1-.7V11h-.3z" fill="currentColor"/></svg>
          </button>
        </div>
      </form>
    </section>
  </div>

  <div class="modal-backdrop hidden" id="settings-modal">
    <div class="modal">
      <header class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="close-settings" aria-label="Close">×</button>
      </header>

      <section class="modal-section">
        <h3>Theme</h3>
        <div class="theme-toggle" id="theme-toggle">
          <button type="button" data-theme="dark">Dark</button>
          <button type="button" data-theme="light">Light</button>
        </div>
      </section>

      <section class="modal-section">
        <h3>Display name</h3>
        <form id="name-form">
          <input name="name" type="text" required maxlength="48" placeholder="Display name" autocomplete="name" />
          <button type="submit">Save name</button>
        </form>
      </section>

      <section class="modal-section">
        <h3>Password</h3>
        <form id="password-form">
          <input name="current" type="password" required placeholder="Current password" autocomplete="current-password" />
          <input name="next" type="password" required minlength="8" placeholder="New password (min 8 chars)" autocomplete="new-password" />
          <button type="submit">Update password</button>
        </form>
      </section>

      <section class="modal-section">
        <h3>Notifications</h3>
        <button type="button" id="notify-btn" class="modal-secondary-btn">Enable notifications</button>
      </section>

      <section class="modal-section">
        <h3>Session</h3>
        <button type="button" id="logout-btn" class="modal-secondary-btn">Log out</button>
      </section>

      <p id="settings-msg" class="msg"></p>
    </div>
  </div>

  <div class="msg-sheet hidden" id="msg-sheet" role="dialog" aria-modal="true" aria-label="Message actions">
    <div class="msg-sheet-backdrop" data-close></div>
    <div class="msg-sheet-panel">
      <div class="msg-sheet-actions" id="msg-sheet-actions"></div>
    </div>
  </div>

  <div class="reaction-popover hidden" id="reaction-popover" role="menu" aria-label="Quick reactions"></div>

  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button type="button" class="lightbox-btn lightbox-close" id="lightbox-close" aria-label="Close">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M18.3 5.71 12 12.01l-6.3-6.3-1.41 1.41 6.3 6.3-6.3 6.3 1.41 1.41 6.3-6.3 6.3 6.3 1.41-1.41-6.3-6.3 6.3-6.3z" fill="currentColor"/></svg>
    </button>
    <button type="button" class="lightbox-btn lightbox-save" id="lightbox-save" aria-label="Save image">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>
    </button>
    <button type="button" class="lightbox-btn lightbox-prev hidden" id="lightbox-prev" aria-label="Previous photo">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="lightbox-btn lightbox-next hidden" id="lightbox-next" aria-label="Next photo">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="lightbox-counter hidden" id="lightbox-counter"></div>
    <img id="lightbox-img" alt="Photo" />
    <video id="lightbox-video" class="hidden" controls playsinline></video>
  </div>

  <div class="camera-overlay hidden" id="camera-overlay" role="dialog" aria-modal="true" aria-label="Camera">
    <video id="camera-video" autoplay playsinline muted></video>
    <img id="camera-preview" class="hidden" alt="Photo preview" />
    <button type="button" class="lightbox-btn camera-close" id="camera-close" aria-label="Close camera">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M18.3 5.71 12 12.01l-6.3-6.3-1.41 1.41 6.3 6.3-6.3 6.3 1.41 1.41 6.3-6.3 6.3 6.3 1.41-1.41-6.3-6.3 6.3-6.3z" fill="currentColor"/></svg>
    </button>
    <div class="camera-controls">
      <button type="button" class="camera-side-btn" id="camera-flip" aria-label="Flip camera">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 13c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 8.74A7.93 7.93 0 0 0 4 13c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" fill="currentColor"/></svg>
      </button>
      <button type="button" class="camera-shutter" id="camera-shutter" aria-label="Take photo"></button>
      <button type="button" class="camera-side-btn hidden" id="camera-retake" aria-label="Retake photo">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.73 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
      </button>
      <button type="button" class="camera-send hidden" id="camera-send" aria-label="Send photo">
        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <div class="call-overlay hidden" id="call-overlay" role="dialog" aria-modal="true" aria-label="Voice call">
    <div class="call-screen">
      <button type="button" class="call-minimize" id="call-minimize" aria-label="Back to chat">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="call-avatar avatar" id="call-avatar" aria-hidden="true"></div>
      <div class="call-name" id="call-name"></div>
      <div class="call-status" id="call-status">Calling…</div>
      <div class="call-controls" id="call-controls"></div>
    </div>
  </div>

  <script type="module">
    import {
      requireAuth,
      logout,
      updateName,
      updatePassword,
    } from "./js/auth.js";
    import {
      ensureProfile,
      listOtherUsers,
      updateProfileName,
      subscribeUsers,
      heartbeat,
    } from "./js/users.js";
    import {
      getOrCreateConversation,
      loadMessages,
      sendMessage,
      editMessage,
      deleteMessage,
      markDeleted,
      DELETED_SENTINEL,
      subscribeMessages,
      subscribeAllMessages,
    } from "./js/chat.js";
    import {
      loadReactions,
      createReaction,
      updateReaction,
      removeReaction,
      subscribeReactions,
    } from "./js/reactions.js";
    import {
      loadReceipts,
      createReceipt,
      updateReceipt,
      subscribeReceipts,
    } from "./js/receipts.js";
    import { enablePush } from "./js/push.js";
    import { dialogAlert, dialogConfirm } from "./js/dialog.js";
    import { Call } from "./js/call.js";
    import { subscribeSignals } from "./js/signaling.js";
    import { ID as AppwriteID } from "./js/appwrite.js";
    import { RING_TIMEOUT_MS, COMPOSER_AUTO_EXPAND_MS } from "./js/config.js";
    import {
      getCachedMessages,
      appendCachedMessage,
      updateCachedMessage,
      removeCachedMessage,
      getHiddenIds,
      hideMessageLocally,
      getCachedUserList,
      saveCachedUserList,
      upsertCachedUser,
      removeCachedUser,
      getCachedConversation,
      saveCachedConversation,
      deleteCachedConversation,
      getDeletedAt,
      getLastSeen,
      markSeen,
      getMyReceiptId,
      saveMyReceiptId,
    } from "./js/cache.js";
    import { getTheme, setTheme } from "./js/theme.js";
    import {
      getOutbox,
      enqueueOutbox,
      removeFromOutbox,
      outboxForConversation,
    } from "./js/outbox.js";
    import {
      uploadMessageMedia,
      imageViewUrl,
      imageViewBlobUrl,
      mediaContentType,
    } from "./js/photos.js";

    // <img>/<video> can't send the Appwrite session cookie cross-origin
    // (401 → broken media), so files are fetched once with credentials and
    // served as same-origin blob URLs, cached per file for re-renders.
    // Resolves to { url, type } — type distinguishes photos from videos.
    const imageBlobCache = new Map();
    function bubbleMediaUrl(fileId) {
      if (!imageBlobCache.has(fileId)) {
        // Straight to the raw file — server-side previews 403 on Appwrite
        // Cloud's free plan, and photos upload pre-compressed anyway.
        const p = imageViewBlobUrl(fileId).catch((err) => {
          imageBlobCache.delete(fileId); // allow retry on next render
          throw err;
        });
        imageBlobCache.set(fileId, p);
      }
      return imageBlobCache.get(fileId);
    }

    // MIME type per file (HEAD request — no body), cached.
    const mediaKindCache = new Map();
    function mediaKind(fileId) {
      if (!mediaKindCache.has(fileId)) {
        const p = mediaContentType(fileId).catch((err) => {
          mediaKindCache.delete(fileId);
          throw err;
        });
        mediaKindCache.set(fileId, p);
      }
      return mediaKindCache.get(fileId);
    }

    const me = await requireAuth();
    await ensureProfile(me);

    // ----- Offline state -----
    let online = navigator.onLine !== false;
    const offlineBanners = document.querySelectorAll("[data-offline-banner]");
    function isOffline() { return !online; }
    function setOnlineUI(isOn) {
      online = isOn;
      offlineBanners.forEach((el) => el.classList.toggle("hidden", isOn));
      if (isOn) flushOutbox().catch((e) => console.warn("Outbox flush:", e?.message));
    }
    window.addEventListener("online",  () => setOnlineUI(true));
    window.addEventListener("offline", () => setOnlineUI(false));
    setOnlineUI(online);

    // Match the chat container to the *visible* viewport (excludes the
    // mobile soft keyboard). Keeps the thread header pinned at the top and
    // the composer pinned right above the keyboard, Messenger-style.
    function syncAppHeight() {
      const h = window.visualViewport?.height || window.innerHeight;
      document.documentElement.style.setProperty("--app-h", h + "px");
      const m = document.getElementById("messages");
      if (m) m.scrollTop = m.scrollHeight;
    }
    syncAppHeight();
    window.visualViewport?.addEventListener("resize", syncAppHeight);
    window.visualViewport?.addEventListener("scroll", syncAppHeight);
    window.addEventListener("resize", syncAppHeight);

    function avatarHue(seed) {
      let h = 0;
      for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) & 0xfffff;
      return h % 360;
    }
    function avatarInitial(nameOrEmail) {
      return (nameOrEmail || "?").trim().charAt(0).toUpperCase() || "?";
    }
    function paintAvatar(el, seed, label) {
      el.textContent = avatarInitial(label);
      el.style.setProperty("--hue", String(avatarHue(seed || label || "?")));
    }

    document.getElementById("me-name").textContent = me.name || me.email;
    paintAvatar(document.getElementById("me-avatar"), me.$id, me.name || me.email);

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await logout();
      location.replace("./login.html");
    });

    const userListEl  = document.getElementById("user-list");
    const headerEl    = document.getElementById("thread-title");
    const messagesEl  = document.getElementById("messages");

    // Media bubbles download only when they scroll near the viewport —
    // opening a chat must not pull every photo/video in its history.
    const mediaObserver = new IntersectionObserver((entries) => {
      for (const en of entries) {
        if (!en.isIntersecting) continue;
        mediaObserver.unobserve(en.target);
        en.target._loadMedia?.();
      }
    }, { root: messagesEl, rootMargin: "600px 0px" });

    // Coalesce bottom-snaps to one per frame — setting scrollTop per rendered
    // message forces a layout pass each time and freezes big history loads.
    let scrollPending = false;
    let bulkRender = false; // true while painting cached history
    function scheduleScrollToBottom() {
      if (scrollPending) return;
      scrollPending = true;
      requestAnimationFrame(() => {
        scrollPending = false;
        messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "instant" });
      });
    }

    function leaveActiveConversation() {
      chatEl.dataset.view = "sidebar";
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      if (unsubscribeReactions) { unsubscribeReactions(); unsubscribeReactions = null; }
      if (unsubscribeReceipts)  { unsubscribeReceipts();  unsubscribeReceipts  = null; }
      activeConversation = null;
      activeOther = null;
      receiptsMap.clear();
      document.querySelectorAll(".user-item.active").forEach((el) => el.classList.remove("active"));
      repaintFromCache();
    }

    // Tapping the in-app back button: pop the history entry we pushed when
    // opening this conversation. The popstate handler then closes the chat.
    document.getElementById("back-btn").addEventListener("click", () => {
      if (history.state && history.state.view === "thread") history.back();
      else leaveActiveConversation();
    });

    // Map the phone/browser back button to "leave conversation" so the app
    // doesn't quit while a chat is open. Settings modal takes priority — back
    // closes it first, then (next back) leaves the active conversation.
    window.addEventListener("popstate", () => {
      const cam = document.getElementById("camera-overlay");
      if (cam && !cam.classList.contains("hidden")) {
        closeCamera(); // hoisted — defined with the camera logic below
        return;
      }
      const lb = document.getElementById("lightbox");
      if (lb && !lb.classList.contains("hidden")) {
        hideLightboxUI(); // hoisted — also stops a playing video
        return;
      }
      const sm = document.getElementById("settings-modal");
      if (sm && !sm.classList.contains("hidden")) {
        sm.classList.add("hidden");
        return;
      }
      if (activeConversation) leaveActiveConversation();
    });
    const composerEl  = document.getElementById("composer");
    const inputEl     = document.getElementById("composer-input");
    const chatEl      = document.getElementById("chat");

    let activeConversation = null;
    let activeOther = null;
    let unsubscribe = null;
    const renderedIds = new Set();
    const bubbleMap = new Map(); // messageId -> bubble element
    const messageMap = new Map(); // messageId -> latest message object (for action sheet lookups)
    const reactionsMap = new Map(); // messageId -> array of reaction docs
    const receiptsMap  = new Map(); // userId -> lastSeenAt (active conv only)
    let hiddenIds = new Set();
    let pendingReply = null;
    let unsubscribeReactions = null;
    let unsubscribeReceipts  = null;

    const REACTION_EMOJIS = ["❤️", "😆", "😮", "😢", "😡", "👍"];
    const ONLINE_THRESHOLD_MS = 2 * 60 * 1000;

    function isOnline(user) {
      if (!user?.lastActiveAt) return false;
      const t = new Date(user.lastActiveAt).getTime();
      return Number.isFinite(t) && (Date.now() - t) < ONLINE_THRESHOLD_MS;
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function isDeleted(msg) {
      return msg?.text === DELETED_SENTINEL;
    }

    // Detect/parse call-event messages encoded as `__CALL__{json}` in `text`.
    function parseCallEvent(text) {
      if (!text || !text.startsWith("__CALL__")) return null;
      try { return JSON.parse(text.slice(8)); } catch { return {}; }
    }
    function formatCallSummary(info, isMine) {
      const status = info?.status || "ended";
      const duration = info?.duration || 0;
      if (status === "accepted" && duration > 0) {
        const mm = Math.floor(duration / 60);
        const ss = String(duration % 60).padStart(2, "0");
        return { label: `Voice call · ${mm}:${ss}`, missed: false };
      }
      return { label: isMine ? "No answer" : "Missed voice call", missed: true };
    }
    function paintCallEvent(bubble, msg) {
      const info = parseCallEvent(msg.text);
      const { label, missed } = formatCallSummary(info, msg.senderId === me.$id);
      bubble.innerHTML = "";
      const icon = document.createElement("span");
      icon.className = "call-event-icon" + (missed ? " missed" : "");
      icon.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.5.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.4 21 3 13.6 3 4c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.4 0 .8-.2 1l-2.2 2.3z" fill="currentColor"/></svg>`;
      const text = document.createElement("span");
      text.className = "call-event-text";
      text.textContent = label;
      const time = document.createElement("span");
      time.className = "call-event-time";
      time.textContent = formatTime(msg.$createdAt);
      bubble.append(icon, text, time);
    }

    function paintBubbleContent(bubble, msg) {
      if (parseCallEvent(msg.text)) {
        paintCallEvent(bubble, msg);
        return;
      }
      if (isDeleted(msg)) {
        bubble.innerHTML = "";
        bubble.classList.add("removed");
        bubble.classList.remove("has-image");
        const span = document.createElement("span");
        span.className = "bubble-text removed-text";
        span.textContent = msg.senderId === me.$id ? "You removed a message" : "Message removed";
        bubble.appendChild(span);
        return;
      }
      bubble.classList.remove("removed");
      const edited = msg.$updatedAt && msg.$updatedAt !== msg.$createdAt;
      const isMine = msg.senderId === me.$id;
      bubble.innerHTML = "";

      if (!isMine && activeOther) {
        const av = document.createElement("span");
        av.className = "bubble-avatar";
        av.textContent = avatarInitial(activeOther.name || activeOther.email);
        av.style.setProperty("--hue", String(avatarHue(activeOther.$id)));
        av.setAttribute("aria-hidden", "true");
        bubble.appendChild(av);
      }

      if (msg.replyToId && msg.replyToText) {
        const quote = document.createElement("div");
        quote.className = "bubble-quote";
        const lbl = document.createElement("span");
        lbl.className = "bubble-quote-label";
        lbl.textContent = "↩ Reply";
        const qtxt = document.createElement("span");
        qtxt.className = "bubble-quote-text";
        qtxt.textContent = msg.replyToText;
        quote.append(lbl, qtxt);
        quote.addEventListener("click", (e) => {
          e.stopPropagation();
          const target = bubbleMap.get(msg.replyToId);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "center" });
            target.classList.add("highlight");
            setTimeout(() => target.classList.remove("highlight"), 1200);
          }
        });
        bubble.appendChild(quote);
      }

      const hasImage = !!(msg.imageId || msg._localImageUrl);
      bubble.classList.toggle("has-image", hasImage);
      if (hasImage) {
        const frame = document.createElement("div");
        frame.className = "bubble-image-frame";
        const buildMedia = (url, type) => {
          if (type && type.startsWith("video/")) {
            const v = document.createElement("video");
            v.className = "bubble-image";
            v.src = url;
            v.controls = true;
            v.playsInline = true;
            v.preload = "metadata";
            return v;
          }
          const img = document.createElement("img");
          img.className = "bubble-image";
          img.alt = "Photo";
          img.loading = "lazy";
          img.src = url;
          if (msg.imageId) {
            img.addEventListener("click", (e) => {
              e.stopPropagation();
              openLightbox(msg.imageId);
            });
          }
          return img;
        };
        const showFail = () => {
          frame.innerHTML = "";
          const fail = document.createElement("span");
          fail.className = "bubble-text";
          fail.textContent = "Media unavailable";
          frame.appendChild(fail);
        };
        if (msg._localImageUrl) {
          frame.appendChild(buildMedia(msg._localImageUrl, msg._localMime || "image/jpeg"));
        } else {
          // Lazy: nothing downloads until the bubble scrolls near the
          // viewport. Then a HEAD request decides the kind — images load
          // right away, videos wait for an explicit tap (full-file download).
          const fileId = msg.imageId;
          frame._loadMedia = async () => {
            try {
              const kind = await mediaKind(fileId);
              if (kind.startsWith("video/")) {
                const ph = document.createElement("button");
                ph.type = "button";
                ph.className = "bubble-image video-placeholder";
                ph.setAttribute("aria-label", "Play video");
                ph.innerHTML = `<svg viewBox="0 0 24 24" width="44" height="44" aria-hidden="true"><circle cx="12" cy="12" r="11" fill="rgba(255,255,255,0.25)"/><path d="M10 8l6 4-6 4z" fill="#fff"/></svg>`;
                ph.addEventListener("click", async (e) => {
                  e.stopPropagation();
                  ph.disabled = true;
                  ph.classList.add("loading");
                  try {
                    const { url, type } = await bubbleMediaUrl(fileId);
                    const v = buildMedia(url, type || "video/mp4");
                    ph.replaceWith(v);
                    v.play?.().catch(() => {});
                  } catch {
                    ph.disabled = false;
                    ph.classList.remove("loading");
                    showToast("Video failed to load");
                  }
                });
                frame.appendChild(ph);
              } else {
                const { url, type } = await bubbleMediaUrl(fileId);
                frame.appendChild(buildMedia(url, type));
              }
            } catch {
              showFail();
            }
          };
          mediaObserver.observe(frame);
        }
        bubble.appendChild(frame);
      }

      if (msg.text) {
        const textSpan = document.createElement("span");
        textSpan.className = "bubble-text";
        textSpan.textContent = msg.text;
        bubble.appendChild(textSpan);
      }

      bubble.classList.toggle("pending", !!msg._pending);
      if (msg._pending) {
        const time = document.createElement("span");
        time.className = "time";
        time.textContent = "Sending…";
        bubble.appendChild(time);
      } else if (edited) {
        const time = document.createElement("span");
        time.className = "time";
        time.textContent = "edited";
        bubble.appendChild(time);
      }

      const menuBtn = document.createElement("button");
      menuBtn.className = "bubble-menu-btn";
      menuBtn.type = "button";
      menuBtn.textContent = "⋯";
      menuBtn.setAttribute("aria-label", "Message actions");
      menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const latest = messageMap.get(msg.$id) || msg;
        openMsgSheet(latest, bubble);
      });
      bubble.appendChild(menuBtn);
    }

    const dividerMap = new Map(); // messageId -> divider element
    const anchorIds = new Set(); // messageIds whose divider is permanently visible
    let shownDividerId = null;   // currently tap-revealed (in addition to anchors)
    let lastAnchorTime = null;
    const ANCHOR_GAP_MS = 60 * 60 * 1000; // show a fresh timestamp every hour

    function formatDivider(iso) {
      const d = new Date(iso);
      const time = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startOfYesterday = new Date(startOfToday); startOfYesterday.setDate(startOfToday.getDate() - 1);
      if (d >= startOfToday) return time;
      if (d >= startOfYesterday) return "YESTERDAY AT " + time;
      const weekStart = new Date(startOfToday); weekStart.setDate(startOfToday.getDate() - 6);
      if (d >= weekStart) {
        return d.toLocaleDateString([], { weekday: "short" }).toUpperCase() + " AT " + time;
      }
      return d.toLocaleDateString([], { day: "numeric", month: "short" }).toUpperCase() + " AT " + time;
    }

    // Every message owns a divider. A message becomes an "anchor" (its divider
    // is permanently visible) if it's at least ANCHOR_GAP_MS after the previous
    // anchor — first message is always an anchor. Non-anchor dividers stay
    // hidden but can be tap-revealed; only one tap-revealed at a time. Anchors
    // ignore taps.
    function appendDivider(msg) {
      const t = new Date(msg.$createdAt).getTime();
      const isAnchor = !lastAnchorTime || (t - new Date(lastAnchorTime).getTime()) >= ANCHOR_GAP_MS;
      const div = document.createElement("div");
      div.className = "time-divider" + (isAnchor ? "" : " hidden");
      div.textContent = formatDivider(msg.$createdAt);
      div.dataset.id = msg.$id;
      messagesEl.appendChild(div);
      dividerMap.set(msg.$id, div);
      if (isAnchor) {
        anchorIds.add(msg.$id);
        lastAnchorTime = msg.$createdAt;
      }
    }
    function hideShownDivider() {
      if (!shownDividerId) return;
      if (anchorIds.has(shownDividerId)) { shownDividerId = null; return; }
      const el = dividerMap.get(shownDividerId);
      if (el) el.classList.add("hidden");
      shownDividerId = null;
    }
    function showOnlyDivider(messageId) {
      hideShownDivider();
      const el = dividerMap.get(messageId);
      if (!el) return;
      el.classList.remove("hidden");
      shownDividerId = messageId;
    }
    function toggleDivider(messageId) {
      if (anchorIds.has(messageId)) return;  // anchors are permanent
      if (shownDividerId === messageId) hideShownDivider();
      else showOnlyDivider(messageId);
    }

    function renderMessage(msg) {
      if (hiddenIds.has(msg.$id)) return;
      if (renderedIds.has(msg.$id)) return;
      renderedIds.add(msg.$id);
      messageMap.set(msg.$id, msg);
      messagesEl.querySelector(".empty-conv")?.remove();
      appendDivider(msg);
      const wrap = document.createElement("div");
      const isCall = !!parseCallEvent(msg.text);
      wrap.className = isCall
        ? "bubble system call-event"
        : "bubble " + (msg.senderId === me.$id ? "me" : "them");
      wrap.dataset.id = msg.$id;
      if (bulkRender) wrap.style.animation = "none"; // no entry animation for history
      paintBubbleContent(wrap, msg);
      if (!isCall && !isDeleted(msg)) bindBubbleLongPress(wrap, msg.$id);
      // Messenger-style: 2+ consecutive caption-less photos from the same
      // sender collapse into a .photo-run tile grid. The message's own
      // (hidden) divider was just appended, so the previous message's element
      // is the divider's left neighbour; grouped dividers are tucked before
      // the run to keep the run as the container's last element.
      const isPhotoOnly = !isCall && !isDeleted(msg) &&
        (msg.imageId || msg._localImageUrl) && !msg.text &&
        !(msg._localMime && msg._localMime.startsWith("video/"));
      const side = msg.senderId === me.$id ? "me" : "them";
      const divider = dividerMap.get(msg.$id);
      const prev = divider.previousElementSibling;
      let grouped = false;
      // Tapping a photo opens the lightbox, so its divider can't be
      // tap-revealed — every photo (or run of photos) keeps one divider
      // permanently visible. Pending temps stay hidden; the first confirmed
      // message of a run reveals its divider and marks the run.
      function showPhotoTime(run) {
        if (msg._pending || run?.dataset.timeShown) return;
        divider.classList.remove("hidden");
        anchorIds.add(msg.$id);
        if (run) run.dataset.timeShown = "1";
      }
      if (isPhotoOnly && !anchorIds.has(msg.$id)) {
        if (prev?.classList.contains("photo-run") && prev.classList.contains(side)) {
          prev.appendChild(wrap);
          messagesEl.insertBefore(divider, prev);
          grouped = true;
          showPhotoTime(prev);
        } else if (prev?.classList.contains("bubble") && prev.classList.contains(side) &&
                   prev.classList.contains("has-image") && !prev.querySelector(".bubble-text")) {
          const run = document.createElement("div");
          run.className = "photo-run " + side;
          messagesEl.insertBefore(run, prev);
          run.append(prev, wrap);
          messagesEl.insertBefore(divider, run);
          grouped = true;
          // The bubble we merged with may already show its own divider.
          if (anchorIds.has(prev.dataset.id)) run.dataset.timeShown = "1";
          else showPhotoTime(run);
        }
      }
      if (!grouped) {
        messagesEl.appendChild(wrap);
        if (isPhotoOnly) showPhotoTime(null);
      }
      bubbleMap.set(msg.$id, wrap);
      paintReactions(msg.$id);
      if (!bulkRender) scheduleScrollToBottom();
    }

    function showEmptyConvState() {
      if (!activeOther) return;
      if (messagesEl.querySelector(".bubble")) return;
      if (messagesEl.querySelector(".empty-conv")) return;
      const el = document.createElement("div");
      el.className = "empty-conv";
      el.innerHTML = `
        <div class="empty-conv-avatar avatar" aria-hidden="true"></div>
        <div class="empty-conv-name"></div>
        <div class="empty-conv-sub"></div>
      `;
      paintAvatar(el.querySelector(".avatar"), activeOther.$id, activeOther.name || activeOther.email);
      el.querySelector(".empty-conv-name").textContent = activeOther.name;
      el.querySelector(".empty-conv-sub").textContent = "Say hi 👋";
      messagesEl.appendChild(el);
    }

    function applyMessageUpdate(msg) {
      messageMap.set(msg.$id, msg);
      const bubble = bubbleMap.get(msg.$id);
      if (!bubble) return;
      paintBubbleContent(bubble, msg);
      paintReactions(msg.$id);
    }

    function applyMessageDelete(messageId) {
      messageMap.delete(messageId);
      reactionsMap.delete(messageId);
      const bubble = bubbleMap.get(messageId);
      if (bubble) {
        const run = bubble.parentElement?.classList.contains("photo-run")
          ? bubble.parentElement : null;
        bubble.remove();
        if (run && !run.children.length) run.remove();
        // A run of one photo reverts to a normal standalone bubble.
        else if (run && run.children.length === 1) run.replaceWith(run.firstElementChild);
      }
      bubbleMap.delete(messageId);
      renderedIds.delete(messageId);
      const div = dividerMap.get(messageId);
      if (div) div.remove();
      dividerMap.delete(messageId);
      anchorIds.delete(messageId);
      if (shownDividerId === messageId) shownDividerId = null;
      if (!messagesEl.querySelector(".bubble")) showEmptyConvState();
    }

    // ----- Reactions -----
    function paintReactions(messageId) {
      const bubble = bubbleMap.get(messageId);
      if (!bubble) return;
      bubble.querySelector(".bubble-reactions")?.remove();
      const msg = messageMap.get(messageId);
      if (msg && isDeleted(msg)) return;  // no reactions on a removed message
      const list = reactionsMap.get(messageId) || [];
      if (!list.length) return;
      const groups = new Map(); // emoji -> { count, mine }
      list.forEach((r) => {
        const g = groups.get(r.emoji) || { count: 0, mine: false };
        g.count += 1;
        if (r.userId === me.$id) g.mine = true;
        groups.set(r.emoji, g);
      });
      const wrap = document.createElement("div");
      wrap.className = "bubble-reactions";
      for (const [emoji, { count, mine }] of groups.entries()) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "bubble-reaction" + (mine ? " mine" : "");
        chip.textContent = count > 1 ? `${emoji} ${count}` : emoji;
        chip.title = mine ? "Tap to remove your reaction" : "Tap to react";
        chip.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleReaction(messageId, emoji);
        });
        wrap.appendChild(chip);
      }
      bubble.appendChild(wrap);
    }

    // Keep at most one reaction per (messageId, userId) — newer ingest replaces
    // older. Drops any prior entry that matches either by $id OR by userId, so
    // optimistic placeholders are cleaned up when the real document echoes back.
    function ingestReaction(r) {
      const list = (reactionsMap.get(r.messageId) || []).filter(
        (x) => x.$id !== r.$id && x.userId !== r.userId
      );
      list.push(r);
      reactionsMap.set(r.messageId, list);
    }

    function discardReaction(r) {
      const list = (reactionsMap.get(r.messageId) || []).filter(
        (x) => x.$id !== r.$id
      );
      if (list.length) reactionsMap.set(r.messageId, list);
      else reactionsMap.delete(r.messageId);
    }

    // Toggle the current user's reaction on a message. Optimistically updates
    // local state before the network call so a fast second tap sees the
    // correct "mine" and goes down the update/remove path instead of creating
    // a duplicate doc.
    // ----- Read receipts (sent / delivered / seen) -----
    async function upsertMyReceipt(convId, timestamp) {
      if (!timestamp) return;
      const cachedId = getMyReceiptId(me.$id, convId);
      try {
        if (cachedId) {
          await updateReceipt(cachedId, timestamp);
          return;
        }
        const created = await createReceipt(convId, me.$id, timestamp);
        saveMyReceiptId(me.$id, convId, created.$id);
      } catch (err) {
        // 404 → cached id is stale; recreate.
        if (err?.code === 404) {
          try {
            const created = await createReceipt(convId, me.$id, timestamp);
            saveMyReceiptId(me.$id, convId, created.$id);
          } catch (e) { console.warn("Receipt recreate failed:", e?.message); }
        } else {
          console.warn("Receipt upsert failed:", err?.message || err);
        }
      }
    }

    function repaintReceiptIndicator() {
      messagesEl.querySelectorAll(".receipt-indicator").forEach((el) => el.remove());
      if (!activeConversation || !activeOther) return;
      const meBubbles = messagesEl.querySelectorAll(".bubble.me");
      if (!meBubbles.length) return;
      const lastMine = meBubbles[meBubbles.length - 1];
      const msg = messageMap.get(lastMine.dataset.id);
      if (!msg) return;
      if (parseCallEvent(msg.text)) return;  // skip indicator for call event records

      const otherSeenAt = receiptsMap.get(activeOther.$id);
      let status, isSeen = false;
      if (otherSeenAt && otherSeenAt >= msg.$createdAt) {
        status = "Seen"; isSeen = true;
      } else if (otherSeenAt) {
        status = "Delivered";
      } else {
        status = "Sent";
      }

      const ind = document.createElement("div");
      ind.className = "receipt-indicator" + (isSeen ? " seen" : "");
      if (isSeen) {
        const av = document.createElement("span");
        av.className = "receipt-avatar";
        av.textContent = avatarInitial(activeOther.name || activeOther.email);
        av.style.setProperty("--hue", String(avatarHue(activeOther.$id)));
        ind.appendChild(av);
      }
      const txt = document.createElement("span");
      txt.className = "receipt-text";
      txt.textContent = status;
      ind.appendChild(txt);
      // If the bubble sits inside a photo-run grid, the indicator must go
      // after the run — inside it, it would become a flex tile and shove the
      // photos out of place.
      const anchor = lastMine.parentElement?.classList.contains("photo-run")
        ? lastMine.parentElement
        : lastMine;
      anchor.insertAdjacentElement("afterend", ind);
    }

    async function toggleReaction(messageId, emoji) {
      if (!activeConversation) return;
      const list = reactionsMap.get(messageId) || [];
      const mine = list.find((r) => r.userId === me.$id);
      const convId = activeConversation.$id;

      if (!mine) {
        const tempId = "tmp_" + messageId + "_" + Date.now();
        ingestReaction({
          $id: tempId, conversationId: convId,
          messageId, userId: me.$id, emoji,
        });
        paintReactions(messageId);
        try {
          const created = await createReaction(convId, messageId, me.$id, emoji);
          ingestReaction(created);
          paintReactions(messageId);
        } catch (err) {
          discardReaction({ $id: tempId, messageId });
          paintReactions(messageId);
          dialogAlert("Reaction failed: " + (err?.message || err));
        }
        return;
      }

      if (mine.emoji === emoji) {
        discardReaction(mine);
        paintReactions(messageId);
        try {
          await removeReaction(mine.$id);
        } catch (err) {
          ingestReaction(mine); // rollback
          paintReactions(messageId);
          dialogAlert("Reaction failed: " + (err?.message || err));
        }
        return;
      }

      const prevEmoji = mine.emoji;
      ingestReaction({ ...mine, emoji });
      paintReactions(messageId);
      try {
        await updateReaction(mine.$id, emoji);
      } catch (err) {
        ingestReaction({ ...mine, emoji: prevEmoji }); // rollback
        paintReactions(messageId);
        dialogAlert("Reaction failed: " + (err?.message || err));
      }
    }

    // ----- Bubble long-press / right-click → message action sheet -----
    function bindBubbleLongPress(bubble, messageId) {
      let timer = null, sx = 0, sy = 0, fired = false;
      const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
      bubble.addEventListener("pointerdown", (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        if (e.target.closest("button, a, textarea, input, .bubble-quote, .edit-input")) return;
        fired = false;
        sx = e.clientX; sy = e.clientY;
        timer = setTimeout(() => {
          fired = true;
          const msg = messageMap.get(messageId);
          if (msg) openMsgSheet(msg, bubble);
        }, 480);
      });
      bubble.addEventListener("pointermove", (e) => {
        if (timer && (Math.abs(e.clientX - sx) > 10 || Math.abs(e.clientY - sy) > 10)) cancel();
      });
      ["pointerup", "pointerleave", "pointercancel"].forEach((t) =>
        bubble.addEventListener(t, cancel)
      );
      bubble.addEventListener("click", (e) => {
        if (fired) { e.stopPropagation(); e.preventDefault(); fired = false; return; }
        // Short tap on the bubble body (not on an inner button/link/quote)
        // toggles this message's timestamp divider.
        if (e.target.closest("button, a, textarea, input, .bubble-quote, .bubble-reaction, .edit-input, .bubble-image")) return;
        toggleDivider(messageId);
      }, true);
      bubble.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        const msg = messageMap.get(messageId);
        if (msg) openMsgSheet(msg, bubble);
      });
    }

    const msgSheet           = document.getElementById("msg-sheet");
    const msgSheetActions    = document.getElementById("msg-sheet-actions");
    const reactionPopover    = document.getElementById("reaction-popover");

    // SVG icons for the bottom action sheet (Messenger style)
    const ICON_REPLY  = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z" fill="currentColor"/></svg>`;
    const ICON_COPY   = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/></svg>`;
    const ICON_DELETE = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>`;
    const ICON_MORE   = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/></svg>`;
    const ICON_EDIT   = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>`;
    const ICON_BACK   = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const ICON_HIDE   = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27z" fill="currentColor"/></svg>`;
    const ICON_SAVE   = `<svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>`;

    function openReactionPopover(msg, bubble) {
      reactionPopover.innerHTML = "";
      const myEmoji = (reactionsMap.get(msg.$id) || [])
        .find((r) => r.userId === me.$id)?.emoji;
      REACTION_EMOJIS.forEach((em) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "reaction-popover-btn" + (em === myEmoji ? " active" : "");
        btn.textContent = em;
        btn.setAttribute("aria-label", `React with ${em}`);
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          closeMsgSheet();
          toggleReaction(msg.$id, em);
        });
        reactionPopover.appendChild(btn);
      });
      reactionPopover.classList.remove("hidden");
      // Position above the bubble; if no room, fall back to below.
      const rect = bubble.getBoundingClientRect();
      const pRect = reactionPopover.getBoundingClientRect();
      const gap = 8;
      let top = rect.top - pRect.height - gap;
      if (top < 8) top = rect.bottom + gap;
      let left = rect.left + rect.width / 2 - pRect.width / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - pRect.width - 8));
      reactionPopover.style.top  = top  + "px";
      reactionPopover.style.left = left + "px";
    }

    function closeReactionPopover() {
      reactionPopover.classList.add("hidden");
      reactionPopover.innerHTML = "";
    }

    function openMsgSheet(msg, bubble) {
      if (isDeleted(msg)) return;  // removed messages have no actions
      const isMine = msg.senderId === me.$id;
      renderSheetMain(msg, isMine);
      msgSheet.classList.remove("hidden");
      if (bubble) openReactionPopover(msg, bubble);
    }

    function closeMsgSheet() {
      msgSheet.classList.add("hidden");
      msgSheetActions.innerHTML = "";
      closeReactionPopover();
    }

    function sheetBtn(label, iconHtml, onClick, variant) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "msg-sheet-action" + (variant ? " msg-sheet-action--" + variant : "");
      btn.innerHTML = `<span class="msg-sheet-action-icon">${iconHtml}</span><span class="msg-sheet-action-label"></span>`;
      btn.querySelector(".msg-sheet-action-label").textContent = label;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function renderSheetMain(msg, isMine) {
      msgSheetActions.innerHTML = "";
      msgSheetActions.append(
        sheetBtn("Reply", ICON_REPLY, () => {
          closeMsgSheet();
          setReply(msg);
        }),
      );
      if (msg.imageId) {
        msgSheetActions.appendChild(
          sheetBtn("Save", ICON_SAVE, () => {
            closeMsgSheet();
            saveImage(msg.imageId);
          })
        );
      }
      if (msg.text) {
        msgSheetActions.appendChild(
          sheetBtn("Copy", ICON_COPY, async () => {
            try {
              await navigator.clipboard.writeText(msg.text);
            } catch {
              const ta = document.createElement("textarea");
              ta.value = msg.text;
              document.body.appendChild(ta);
              ta.select();
              try { document.execCommand("copy"); } catch {}
              ta.remove();
            }
            closeMsgSheet();
          })
        );
      }
      msgSheetActions.appendChild(
        sheetBtn("Delete", ICON_DELETE, () => renderSheetDelete(msg, isMine), "danger"),
      );
      if (isMine) {
        msgSheetActions.appendChild(
          sheetBtn("More", ICON_MORE, () => renderSheetMore(msg))
        );
      }
    }

    function renderSheetDelete(msg, isMine) {
      msgSheetActions.innerHTML = "";
      if (isMine) {
        msgSheetActions.appendChild(
          sheetBtn("For everyone", ICON_DELETE, async () => {
            closeMsgSheet();
            await removeForEveryone(msg);
          }, "danger")
        );
      }
      msgSheetActions.append(
        sheetBtn("For me", ICON_HIDE, () => {
          closeMsgSheet();
          removeForMe(msg);
        }),
        sheetBtn("Back", ICON_BACK, () => renderSheetMain(msg, isMine)),
      );
    }

    function renderSheetMore(msg) {
      msgSheetActions.innerHTML = "";
      msgSheetActions.append(
        sheetBtn("Edit", ICON_EDIT, () => {
          closeMsgSheet();
          startEdit(msg);
        }),
        sheetBtn("Back", ICON_BACK, () => renderSheetMain(msg, true)),
      );
    }

    // Generic long-press / right-click binder used by sidebar user items.
    function bindLongPress(el, onLong, onTap) {
      let fired = false, timer = null, sx = 0, sy = 0;
      const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
      el.addEventListener("pointerdown", (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        fired = false;
        sx = e.clientX; sy = e.clientY;
        timer = setTimeout(() => { fired = true; onLong(); }, 480);
      });
      el.addEventListener("pointermove", (e) => {
        if (timer && (Math.abs(e.clientX - sx) > 10 || Math.abs(e.clientY - sy) > 10)) cancel();
      });
      ["pointerup", "pointerleave", "pointercancel"].forEach((t) => el.addEventListener(t, cancel));
      el.addEventListener("click", (e) => {
        if (fired) { e.stopPropagation(); fired = false; return; }
        onTap?.();
      });
      el.addEventListener("contextmenu", (e) => { e.preventDefault(); onLong(); });
    }

    // Action sheet for a sidebar chat item — currently just "Delete chat".
    function openChatSheet(other) {
      msgSheetActions.innerHTML = "";
      msgSheetActions.append(
        sheetBtn("Delete chat", ICON_DELETE, async () => {
          closeMsgSheet();
          const ok = await dialogConfirm(
            `Delete chat with ${other.name} from this device?\nMessages on the server are not affected.`,
            { okLabel: "Delete", danger: true }
          );
          if (ok) deleteChatLocally(other);
        }, "danger"),
        sheetBtn("Cancel", ICON_BACK, closeMsgSheet),
      );
      msgSheet.classList.remove("hidden");
    }

    function deleteChatLocally(other) {
      const pairKey = [me.$id, other.$id].sort().join("_");
      const conv = deleteCachedConversation(me.$id, pairKey);
      if (!conv) return;
      // If this was the active conversation, leave it.
      if (activeConversation && activeConversation.$id === conv.$id) {
        leaveActiveConversation();
      }
      repaintFromCache();
    }

    msgSheet.addEventListener("click", (e) => {
      if (e.target.dataset.close !== undefined) closeMsgSheet();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeMsgSheet();
        toggleEmojiPicker(false);
      }
    });

    // ----- Edit / delete actions -----
    function startEdit(msg) {
      const bubble = bubbleMap.get(msg.$id);
      if (!bubble) return;
      bubble.innerHTML = "";
      bubble.classList.add("editing");
      const ta = document.createElement("textarea");
      ta.className = "edit-input";
      ta.value = msg.text;
      ta.rows = 1;
      const actions = document.createElement("div");
      actions.className = "edit-actions";
      const save   = document.createElement("button");
      save.type = "button"; save.textContent = "Save";
      const cancel = document.createElement("button");
      cancel.type = "button"; cancel.textContent = "Cancel";
      actions.append(save, cancel);
      bubble.append(ta, actions);
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);

      const restore = () => {
        bubble.classList.remove("editing");
        paintBubbleContent(bubble, msg);
      };

      cancel.addEventListener("click", restore);

      save.addEventListener("click", async () => {
        const next = ta.value.trim();
        if (!next || next === msg.text) { restore(); return; }
        try {
          const updated = await editMessage(msg.$id, next);
          // Optimistic: realtime will also fire and re-paint, but do it now too.
          Object.assign(msg, { text: updated.text, $updatedAt: updated.$updatedAt });
          updateCachedMessage(me.$id, activeConversation.$id, msg.$id, {
            text: updated.text, $updatedAt: updated.$updatedAt,
          });
          bubble.classList.remove("editing");
          paintBubbleContent(bubble, msg);
        } catch (err) {
          dialogAlert("Edit failed: " + err.message);
        }
      });

      ta.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); save.click(); }
        if (e.key === "Escape") cancel.click();
      });
    }

    async function removeForEveryone(msg) {
      const ok = await dialogConfirm(
        "Remove this message for everyone? This cannot be undone.",
        { okLabel: "Remove", danger: true }
      );
      if (!ok) return;
      try {
        const updated = await markDeleted(msg.$id);
        // Tombstone locally too — realtime update will repaint the same way.
        updateCachedMessage(me.$id, activeConversation.$id, msg.$id, {
          text: DELETED_SENTINEL, $updatedAt: updated.$updatedAt,
        });
        applyMessageUpdate({ ...msg, text: DELETED_SENTINEL, $updatedAt: updated.$updatedAt });
      } catch (err) {
        dialogAlert("Remove failed: " + err.message);
      }
    }

    function removeForMe(msg) {
      hideMessageLocally(me.$id, msg.$id);
      hiddenIds.add(msg.$id);
      applyMessageDelete(msg.$id);
    }

    async function openConversation(other) {
      activeOther = other;
      headerEl.innerHTML = "";
      const nameEl = document.createElement("span");
      nameEl.className = "name";
      nameEl.textContent = other.name;
      headerEl.append(nameEl);

      const threadAvatar = document.getElementById("thread-avatar");
      threadAvatar.classList.remove("hidden");
      paintAvatar(threadAvatar, other.$id, other.name || other.email);
      const cachedOther = (getCachedUserList(me.$id)?.users || []).find((x) => x.$id === other.$id);
      threadAvatar.classList.toggle("online", isOnline(cachedOther || other));
      document.getElementById("thread-actions").classList.remove("hidden");
      updateCallPill();

      messagesEl.innerHTML = "";
      mediaObserver.disconnect(); // drop observers from the previous chat
      renderedIds.clear();
      bubbleMap.clear();
      messageMap.clear();
      reactionsMap.clear();
      receiptsMap.clear();
      dividerMap.clear();
      anchorIds.clear();
      shownDividerId = null;
      lastAnchorTime = null;
      setReply(null);
      // Show the "Send a message to start chatting" placeholder right away;
      // it'll be removed the moment the first bubble lands.
      showEmptyConvState();
      hiddenIds = getHiddenIds(me.$id);
      composerEl.classList.remove("hidden");
      // Push one history entry the first time we enter thread view so the
      // phone/browser back button maps to "leave conversation" instead of
      // exiting the app. Switching between conversations reuses the same entry.
      if (!history.state || history.state.view !== "thread") {
        history.pushState({ view: "thread" }, "");
      }
      chatEl.dataset.view = "thread";

      document.querySelectorAll(".user-item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === other.$id);
      });

      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      if (unsubscribeReactions) { unsubscribeReactions(); unsubscribeReactions = null; }
      if (unsubscribeReceipts)  { unsubscribeReceipts();  unsubscribeReceipts  = null; }

      try {
        activeConversation = await getOrCreateConversation(me.$id, other.$id);
      } catch (err) {
        // Offline / network failure — fall back to a stub from cache or pairKey.
        const pairKey = [me.$id, other.$id].sort().join("_");
        const stub = getCachedConversation(me.$id, pairKey);
        if (!stub) {
          dialogAlert("Can't open this chat while offline — open it once while connected.");
          return;
        }
        activeConversation = stub;
      }
      const convId = activeConversation.$id;

      // Paint only the latest chunk of history — thousands of bubbles in one
      // go locks up the main thread. The rest renders on demand.
      const INITIAL_RENDER_CAP = 150;
      const cached = getCachedMessages(me.$id, convId);
      const skipped = Math.max(0, cached.length - INITIAL_RENDER_CAP);
      if (skipped > 0) {
        const earlier = document.createElement("button");
        earlier.type = "button";
        earlier.className = "load-earlier";
        earlier.textContent = `Show ${skipped} earlier messages`;
        earlier.addEventListener("click", () => {
          // Re-render the full history through the cheap bulk path.
          messagesEl.innerHTML = "";
          mediaObserver.disconnect();
          renderedIds.clear();
          bubbleMap.clear();
          dividerMap.clear();
          anchorIds.clear();
          shownDividerId = null;
          lastAnchorTime = null;
          bulkRender = true;
          getCachedMessages(me.$id, convId).forEach(renderMessage);
          bulkRender = false;
          reactionsMap.forEach((_, id) => paintReactions(id));
          repaintReceiptIndicator();
          messagesEl.scrollTop = 0; // reader starts at the old messages
        });
        messagesEl.appendChild(earlier);
      }
      bulkRender = true;
      cached.slice(skipped).forEach(renderMessage);
      bulkRender = false;
      messagesEl.scrollTop = messagesEl.scrollHeight; // single bottom-snap

      let since = cached.length ? cached[cached.length - 1].$createdAt : null;
      const deletedAt = getDeletedAt(me.$id, convId);
      if (deletedAt && (!since || deletedAt > since)) since = deletedAt;
      try {
        const fresh = await loadMessages(convId, since);
        fresh.forEach((msg) => {
          appendCachedMessage(me.$id, convId, msg);
          renderMessage(msg);
        });
      } catch (err) {
        // Offline — cached messages are already painted; skip the delta.
        console.warn("loadMessages failed:", err?.message);
      }

      // Render any queued-but-unsent messages from the outbox.
      outboxForConversation(me.$id, convId).forEach((item) => {
        renderMessage({
          $id: item.tempId,
          conversationId: convId,
          senderId: me.$id,
          receiverId: item.receiverId,
          text: item.text,
          $createdAt: item.queuedAt,
          $updatedAt: null,
          _pending: true,
          ...(item.reply ? { replyToId: item.reply.id, replyToText: (item.reply.text || "").slice(0, 280) } : {}),
        });
      });

      // Mark this conversation as seen up to its latest message.
      const all = getCachedMessages(me.$id, convId);
      if (all.length) {
        markSeen(me.$id, convId, all[all.length - 1].$createdAt);
        repaintFromCache();
      } else if (!outboxForConversation(me.$id, convId).length) {
        showEmptyConvState();
      }

      unsubscribe = subscribeMessages(convId, {
        onCreate: (msg) => {
          appendCachedMessage(me.$id, convId, msg);
          renderMessage(msg);
          markSeen(me.$id, convId, msg.$createdAt);
          // Update my receipt so the other side can flip my Sent → Seen.
          if (msg.senderId !== me.$id) upsertMyReceipt(convId, msg.$createdAt);
          repaintReceiptIndicator();
        },
        onUpdate: (msg) => {
          updateCachedMessage(me.$id, convId, msg.$id, {
            text: msg.text, $updatedAt: msg.$updatedAt,
          });
          applyMessageUpdate(msg);
        },
        onDelete: (msg) => {
          removeCachedMessage(me.$id, convId, msg.$id);
          applyMessageDelete(msg.$id);
        },
      });

      // Load reactions for this conversation and subscribe to live updates.
      try {
        const reactionDocs = await loadReactions(convId);
        reactionDocs.forEach(ingestReaction);
        reactionsMap.forEach((_, messageId) => paintReactions(messageId));
      } catch (err) {
        console.warn("loadReactions failed:", err?.message);
      }

      unsubscribeReactions = subscribeReactions(convId, {
        onCreate: (r) => { ingestReaction(r);  paintReactions(r.messageId); },
        onUpdate: (r) => { ingestReaction(r);  paintReactions(r.messageId); },
        onDelete: (r) => { discardReaction(r); paintReactions(r.messageId); },
      });

      // Receipts — load both participants' read state, upsert mine to the
      // latest message, and stay subscribed for live Sent/Delivered/Seen flips.
      let receiptDocs = null;
      try {
        receiptDocs = await loadReceipts(convId);
      } catch (err) {
        console.warn("loadReceipts failed:", err?.message);
      }
      if (receiptDocs !== null) {
        receiptDocs.forEach((r) => receiptsMap.set(r.userId, r.lastSeenAt));
        const latest = getCachedMessages(me.$id, convId).slice(-1)[0];
        if (latest) upsertMyReceipt(convId, latest.$createdAt);
        repaintReceiptIndicator();

        unsubscribeReceipts = subscribeReceipts(convId, {
          onCreate: (r) => { receiptsMap.set(r.userId, r.lastSeenAt); repaintReceiptIndicator(); },
          onUpdate: (r) => { receiptsMap.set(r.userId, r.lastSeenAt); repaintReceiptIndicator(); },
          onDelete: (r) => { receiptsMap.delete(r.userId);           repaintReceiptIndicator(); },
        });
      }
    }

    // Refetch the full user list from Appwrite at most this often. Realtime
    // keeps the cache live in between, but a shorter TTL lets clients that
    // were offline during a user-doc delete catch up sooner.
    const USER_LIST_TTL_MS = 30 * 60 * 1000;

    function paintUserList(users) {
      if (!users || !users.length) {
        userListEl.innerHTML = '<div class="empty">No other users yet. Have a friend sign up.</div>';
        return;
      }
      const activeId = document.querySelector(".user-item.active")?.dataset.id;
      userListEl.innerHTML = "";
      users.forEach(u => {
        if (u.$id === me.$id) return;
        const item = document.createElement("div");
        item.className = "user-item" + (u.$id === activeId ? " active" : "");
        item.dataset.id = u.$id;
        item.innerHTML = `
          <div class="avatar" aria-hidden="true"></div>
          <div class="user-meta">
            <span class="name"></span>
            <span class="last-message"></span>
          </div>
        `;
        const avEl = item.querySelector(".avatar");
        paintAvatar(avEl, u.$id, u.name || u.email);
        if (isOnline(u)) avEl.classList.add("online");
        item.querySelector(".name").textContent = u.name;

        // Last message preview + unread bolding (from local cache only).
        const pairKey = [me.$id, u.$id].sort().join("_");
        const conv = getCachedConversation(me.$id, pairKey);
        if (conv) {
          const msgs = getCachedMessages(me.$id, conv.$id);
          const last = msgs[msgs.length - 1];
          if (last) {
            const callInfo = parseCallEvent(last.text);
            let display, prefix;
            if (callInfo) {
              const { label, missed } = formatCallSummary(callInfo, last.senderId === me.$id);
              display = "📞 " + label;
              prefix = "";
            } else if (isDeleted(last)) {
              prefix = "";
              display = last.senderId === me.$id ? "You removed a message" : "Message removed";
            } else if (last.imageId && !last.text) {
              prefix = last.senderId === me.$id ? "You: " : "";
              display = "📷 Photo";
            } else {
              prefix = last.senderId === me.$id ? "You: " : "";
              display = last.text;
            }
            item.querySelector(".last-message").textContent = prefix + display;
            const lastSeen = getLastSeen(me.$id, conv.$id);
            const isUnread = last.senderId !== me.$id && last.$createdAt > lastSeen;
            if (isUnread) item.classList.add("unread");
          }
        }
        bindLongPress(item, () => openChatSheet(u), () => openConversation(u));
        userListEl.appendChild(item);
      });
    }

    async function renderUserList() {
      const cached = getCachedUserList(me.$id);
      const stale = !cached
        || !cached.users?.length
        || (Date.now() - cached.fetchedAt) > USER_LIST_TTL_MS;

      if (cached) paintUserList(cached.users);

      if (stale) {
        try {
          const users = await listOtherUsers(me.$id);
          saveCachedUserList(me.$id, users);
          paintUserList(users);
        } catch (err) {
          console.warn("User list refresh failed:", err);
          if (!cached) userListEl.innerHTML = '<div class="empty">Failed to load users.</div>';
        }
      }
    }

    function repaintFromCache() {
      const cached = getCachedUserList(me.$id);
      paintUserList(cached?.users || []);
      // Keep the thread-header avatar's online dot in sync too.
      if (activeOther) {
        const u = cached?.users.find((x) => x.$id === activeOther.$id);
        document.getElementById("thread-avatar").classList.toggle("online", isOnline(u || activeOther));
      }
    }

    // Presence heartbeat — bumps my lastActiveAt ~once a minute while the
    // tab is visible, and immediately whenever the tab regains focus.
    let lastBeatAt = 0;
    async function beat() {
      const now = Date.now();
      if (now - lastBeatAt < 30_000) return;
      lastBeatAt = now;
      await heartbeat(me.$id);
    }
    beat();
    setInterval(beat, 60_000);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") beat();
    });
    // Re-evaluate "online vs offline" every 30s so stale users grey out.
    setInterval(repaintFromCache, 30_000);

    // ----- Notifications -----
    const notifyAvailable = () => "Notification" in window;
    const notifyAllowed   = () => notifyAvailable() && Notification.permission === "granted";

    function showMessageNotification(senderName, text, conversationId, otherUserId) {
      if (!notifyAllowed()) return;
      // Skip if the user is actively viewing this chat.
      if (document.visibilityState === "visible" &&
          activeConversation && activeConversation.$id === conversationId) return;
      try {
        const n = new Notification(senderName, {
          body: text,
          icon: "./icon.svg",
          badge: "./icon.svg",
          tag: conversationId,   // collapse multiple from same chat
          renotify: true,
        });
        n.addEventListener("click", () => {
          window.focus();
          n.close();
          const users = getCachedUserList(me.$id)?.users || [];
          const user = users.find((u) => u.$id === otherUserId);
          if (user) openConversation(user);
        });
      } catch (e) { /* some browsers reject from non-secure or unfocused contexts */ }
    }

    // Keep sidebar previews + unread state live across all conversations.
    subscribeAllMessages(me.$id, {
      onCreate: (msg) => {
        appendCachedMessage(me.$id, msg.conversationId, msg);
        // Auto-cache the conversation stub so the sidebar can locate it
        // even if this is the very first message in a new chat.
        const otherId = msg.senderId === me.$id ? msg.receiverId : msg.senderId;
        const pairKey = [me.$id, otherId].sort().join("_");
        if (!getCachedConversation(me.$id, pairKey)) {
          saveCachedConversation(me.$id, pairKey, {
            $id: msg.conversationId,
            pairKey,
            participants: [me.$id, otherId],
          });
        }
        // Own messages are implicitly seen; same for the active conversation.
        if (msg.senderId === me.$id ||
            (activeConversation && msg.conversationId === activeConversation.$id)) {
          markSeen(me.$id, msg.conversationId, msg.$createdAt);
        }
        // Notify on incoming messages from others (skip call-event + removed).
        if (msg.senderId !== me.$id && !parseCallEvent(msg.text) && !isDeleted(msg)) {
          const sender = (getCachedUserList(me.$id)?.users || []).find((u) => u.$id === msg.senderId);
          const previewText = msg.text || (msg.imageId ? "📷 Photo" : "");
          showMessageNotification(sender?.name || "New message", previewText, msg.conversationId, msg.senderId);
        }
        repaintFromCache();
      },
      onUpdate: (msg) => {
        updateCachedMessage(me.$id, msg.conversationId, msg.$id, {
          text: msg.text, $updatedAt: msg.$updatedAt,
        });
        repaintFromCache();
      },
      onDelete: (msg) => {
        removeCachedMessage(me.$id, msg.conversationId, msg.$id);
        repaintFromCache();
      },
    });

    // Live updates — realtime is free, so we don't need to repoll the list.
    subscribeUsers({
      onCreate: (user) => {
        if (user.$id === me.$id) return;
        if (upsertCachedUser(me.$id, user)) repaintFromCache();
      },
      onUpdate: (user) => {
        if (user.$id === me.$id) return;
        if (upsertCachedUser(me.$id, user)) repaintFromCache();
      },
      onDelete: (user) => {
        if (removeCachedUser(me.$id, user.$id)) repaintFromCache();
      },
    });

    function tempMsgId() {
      return "tmp_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    }

    // Render an optimistic "sending" bubble immediately, queue to outbox if
    // offline, otherwise fire the network call and swap temp → real on success.
    async function sendWithOptimism(text, reply) {
      if (!activeConversation || !activeOther) return;
      const tempId = tempMsgId();
      const convId = activeConversation.$id;
      const optimistic = {
        $id: tempId,
        conversationId: convId,
        senderId: me.$id,
        receiverId: activeOther.$id,
        text,
        $createdAt: new Date().toISOString(),
        $updatedAt: null,
        _pending: true,
      };
      if (reply?.id) {
        optimistic.replyToId   = reply.id;
        optimistic.replyToText = (reply.text || "").slice(0, 280);
      }
      renderMessage(optimistic);

      const item = {
        tempId,
        conversationId: convId,
        receiverId: activeOther.$id,
        text,
        reply: reply ? { id: reply.id, text: reply.text } : null,
        queuedAt: optimistic.$createdAt,
      };

      if (isOffline()) {
        enqueueOutbox(me.$id, item);
        return;
      }

      try {
        const sent = await sendMessage(activeConversation, me.$id, text, reply);
        applyMessageDelete(tempId);
        appendCachedMessage(me.$id, convId, sent);
        renderMessage(sent);
      } catch (err) {
        // Network blip → keep the pending bubble and queue. Real errors → drop.
        if (isOffline() || err?.message?.toLowerCase().includes("network")) {
          enqueueOutbox(me.$id, item);
        } else {
          applyMessageDelete(tempId);
          dialogAlert("Failed to send: " + err.message);
        }
      }
    }

    composerEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text || !activeConversation) return;
      const reply = pendingReply;
      inputEl.value = "";
      setReply(null);
      refreshComposerMode();
      sendWithOptimism(text, reply);
    });

    async function flushOutbox() {
      const items = getOutbox(me.$id);
      for (const item of items) {
        const convStub = {
          $id: item.conversationId,
          participants: [me.$id, item.receiverId],
        };
        try {
          const sent = await sendMessage(convStub, me.$id, item.text, item.reply);
          removeFromOutbox(me.$id, item.tempId);
          appendCachedMessage(me.$id, item.conversationId, sent);
          if (activeConversation && activeConversation.$id === item.conversationId) {
            applyMessageDelete(item.tempId);
            renderMessage(sent);
          }
          repaintFromCache();
        } catch (err) {
          console.warn("Outbox send failed:", err?.message);
          // Likely offline again — stop and retry on next reconnect.
          if (!navigator.onLine) break;
        }
      }
    }

    function refreshComposerMode() {
      const hasText = inputEl.value.trim().length > 0;

      // Empty input → let CSS define the height (no inline override).
      // Typed input → auto-grow up to 140px, but only when actually visible —
      // when the composer is hidden, scrollHeight is 0 and would lock height=0.
      if (!hasText || inputEl.offsetParent === null) {
        inputEl.style.height = "";
        return;
      }
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    }
    inputEl.addEventListener("input", refreshComposerMode);

    function buildEmojiPicker() {

    function insertAtCursor(textarea, str) {
      const start = textarea.selectionStart ?? textarea.value.length;
      const end   = textarea.selectionEnd   ?? textarea.value.length;
      textarea.value = textarea.value.slice(0, start) + str + textarea.value.slice(end);
      const pos = start + str.length;
      textarea.selectionStart = textarea.selectionEnd = pos;
      textarea.focus();
      refreshComposerMode();
    }
